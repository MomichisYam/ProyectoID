services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "nc", "-zv", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  postgres:
    image: postgres:15
    container_name: postgres_warehouse
    environment:
      POSTGRES_DB: security_warehouse
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d security_warehouse"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  consumer:
    build: ./consumer
    container_name: consumer
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      TOPIC: sec-alerts
      POSTGRES_HOST: postgres
      POSTGRES_DB: security_warehouse
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    volumes:
      - ./datalake/raw:/datalake/raw
    restart: unless-stopped
    command: sh -c "sleep 5 && python consumer.py"

  producer:
    build: ./producer
    container_name: producer
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./data:/data
      - ./datalake/raw:/datalake/raw
      - producer_state:/tmp  # Para guardar la posición de lectura
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      TOPIC: sec-alerts
    restart: unless-stopped  #  Producer siempre corriendo
    command: sh -c "sleep 10 && python producer.py"

volumes:
  postgres_data:
  producer_state:  # Nuevo volumen para mantener el estado